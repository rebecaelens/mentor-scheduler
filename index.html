<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentor Scheduler</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/responsive.css">
</head>

<body>
    <div class="page-shell">
        <header class="topbar">
            <div class="brand-mark">
                <img src="./assets/logo.svg" alt="Mentor Scheduler" class="brand-logo">

                <div>
                    <p class="eyebrow">Projeto de portfólio</p>
                    <h1>Mentor Scheduler</h1>
                </div>
            </div>

            <div id="userInfo" class="auth-zone"></div>
        </header>

        <main class="app-shell">
            <section class="hero card-surface">
                <div>
                    <p class="hero-kicker">Agendamento de mentoria</p>
                    <h2>Reserve horários, acompanhe a agenda e mantenha tudo salvo no navegador.</h2>
                </div>

            </section>

            <section id="dashboardStats" class="dashboard-grid"></section>

            <section class="workspace-grid">
                <article class="panel">
                    <div class="panel-head">
                        <div>
                            <p>Profissionais</p>
                            <h3>Mentores</h3>
                        </div>
                        <span class="panel-hint">Especialistas disponíveis</span>
                    </div>
                    <div id="mentorsList" class="mentors-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; padding: 15px 0;"></div>
                </article>
            </section>

            <section class="workspace-grid">
                <article class="panel">
                    <div class="panel-head">
                        <div>
                            <p>Disponibilidade</p>
                            <h3>Horários</h3>
                        </div>

                        <span class="panel-hint">Escolha uma faixa</span>
                    </div>

                    <div style="margin-bottom: 15px;">
                        <input type="text" id="scheduleSearch" placeholder="[Busca] Mentor, dia ou horário..." style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9em;">
                    </div>

                    <div id="schedulerGrid" class="schedule-grid"></div>
                </article>

                <article class="panel">
                    <div class="panel-head">
                        <div>
                            <p>Agenda</p>
                            <h3>Próximas mentorias</h3>
                        </div>

                        <span class="panel-hint">Reservas salvas</span>
                    </div>

                    <div id="bookingsList" class="bookings-list"></div>
                </article>
            </section>
        </main>
    </div>

    <script type="module" src="./js/main.js"></script>
</body>
</html>
